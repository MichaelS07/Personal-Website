    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "E-commerce Growth Expert",
        "description": "Transform your online business with data-driven e-commerce optimization, CRO strategies, and conversion-focused design solutions.",
        "url": "https://your-domain.com",
        "serviceType": "E-commerce Optimization",
        "provider": {
            "@type": "Person",
            "name": "Your Name",
            "jobTitle": "E-commerce Growth Expert",
            "education": {
                "@type": "EducationalOrganization",
                "name": "University of Canterbury",
                "department": "Commerce - Marketing & Information Systems"
            }
        },
        "areaServed": {
            "@type": "Place",
            "name": "Worldwide"
        },
        "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "E-commerce Services",
            "itemListElement": [
                {
                    "@type": "Offer",
                    "itemOffered": {
                        "@type": "Service",
                        "name": "Conversion Rate Optimization",
                        "description": "Analyze user behavior and implement strategic changes to increase conversion rates"
                    }
                },
                {
                    "@type": "Offer",
                    "itemOffered": {
                        "@type": "Service",
                        "name": "UX/UI Design Optimization",
                        "description": "Create intuitive, user-friendly interfaces that guide customers seamlessly"
                    }
                }
            ]
        },
        "review": [
            {
                "@type": "Review",
                "author": {
                    "@type": "Person",
                    "name": "Sarah Johnson"
                },
                "reviewBody": "The conversion rate improvements were immediate and significant. Our revenue increased by 35% within the first month.",
                "reviewRating": {
                    "@type": "Rating",
                    "ratingValue": "5",
                    "bestRating": "5"
                }
            }
        ]
    }
    </script>
